<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown 🌻</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(
          circle at top,
          #1e293b 0%,
          #0f172a 40%,
          #020617 100%
        );
        background-size: 200% 200%;
        animation: bgMove 12s ease infinite;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        width: 90%;
        max-width: 700px;
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 34px;
        text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
      }

      .subtitle {
        text-align: center;
        opacity: 0.7;
        margin-bottom: 25px;
        font-size: 14px;
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 22px;
        margin: 15px 0;
        backdrop-filter: blur(14px);
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.2);
      }

      .card:hover {
        transform: translateY(-3px) scale(1.01);
        box-shadow: 0 0 35px rgba(56, 189, 248, 0.12);
      }

      .label {
        font-size: 14px;
        opacity: 0.65;
        letter-spacing: 0.5px;
      }

      .value {
        font-size: 34px;
        margin-top: 8px;
        font-weight: bold;
        text-shadow: 0 0 18px rgba(56, 189, 248, 0.2);
      }

      .mini {
        margin-top: 8px;
        opacity: 0.5;
        font-size: 13px;
      }

      .bar {
        height: 12px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        margin-top: 14px;
        overflow: hidden;
      }

      .fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        transition:
          width 1s ease,
          background 1s ease,
          box-shadow 1s ease;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
      }

      .timeline {
        height: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 22px;
      }

      .timeline-fill {
        height: 100%;
        width: 0%;
        transition: width 1s ease;
        background: linear-gradient(90deg, #ef4444, #f59e0b, #22c55e);
      }

      .ultra-time {
        font-size: 18px;
        opacity: 0.8;
        margin-top: 10px;
      }

      .fade {
        animation: fadeIn 0.8s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .pulse {
        animation: pulse 2.5s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 rgba(56, 189, 248, 0.15);
        }
        50% {
          box-shadow: 0 0 30px rgba(56, 189, 248, 0.25);
        }
        100% {
          box-shadow: 0 0 0 rgba(56, 189, 248, 0.15);
        }
      }

      .done {
        color: #22c55e;
        font-size: 40px;
        text-align: center;
        margin-top: 20px;
        animation: pop 0.7s ease;
      }

      @keyframes pop {
        from {
          transform: scale(0.6);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Countdown 🌻</h1>
      <div class="subtitle"> avant de passer le test de citoyenneté </div>

      <div class="timeline">
        <div class="timeline-fill" id="timeline"></div>
      </div>

      <div class="card fade pulse">
        <div class="value"><span id="days-label"></span></div>

        <div class="ultra-time" id="precise-time"> 0j 0h 0m 0s </div>

        <div class="bar">
          <div class="fill" id="barDays"></div>
        </div>

        <div class="mini" id="days-passed"></div>
      </div>

      <div class="card fade">
        <div class="label">Jours restants</div>
        <div class="value" id="days">0</div>
      </div>

      <div class="card fade">
        <div class="label">Week-ends restants</div>
        <div class="value" id="weekends">0</div>
      </div>

      <div class="card fade">
        <div class="label">Mois restants (approx)</div>
        <div class="value" id="months">0</div>
      </div>

      <div id="doneMessage"></div>
    </div>

    <script>
      const targetDate = new Date('2027-10-18');

      // date de départ pour la timeline
      const startDate = new Date('2026-03-17');

      function countWeekends(start, end) {
        let count = 0;
        let d = new Date(start);

        while (d <= end) {
          const day = d.getDay();

          if (day === 0 || day === 6) count++;

          d.setDate(d.getDate() + 1);
        }

        return count;
      }

      function getGradient(percent) {
        const hue = percent * 1.2;
        return `hsl(${hue}, 85%, 55%)`;
      }

      function update() {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <= 0) {
          document.getElementById('doneMessage').innerHTML =
            '<div class="done">🎉 Eligible 🎉</div>';

          document.getElementById('days').innerText = 0;
          document.getElementById('months').innerText = 0;
          document.getElementById('weekends').innerText = 0;

          return;
        }

        // temps précis
        let remaining = diff;

        const preciseDays = Math.floor(remaining / 86400000);
        remaining %= 86400000;

        const hours = Math.floor(remaining / 3600000);
        remaining %= 3600000;

        const minutes = Math.floor(remaining / 60000);
        remaining %= 60000;

        const seconds = Math.floor(remaining / 1000);

        document.getElementById('precise-time').innerText =
          `${preciseDays}j ${hours}h ${minutes}m ${seconds}s`;

        const days = Math.max(0, Math.floor(diff / 86400000));

        const months = Math.floor(days / 30);

        const weekends = countWeekends(now, targetDate);

        const totalDays = (targetDate - startDate) / 86400000;

        const passedDays = (now - startDate) / 86400000;

        const progress = Math.min(
          100,
          Math.max(0, (passedDays / totalDays) * 100),
        );

        // affichage
        document.getElementById('days').innerText = days;
        document.getElementById('months').innerText = months;
        document.getElementById('weekends').innerText = weekends;

        document.getElementById('days-label').innerText =
          `${progress.toFixed(1)}% complété`;

        document.getElementById('days-passed').innerText =
          `${Math.floor(passedDays)} jours passés • ${days} restants`;

        // barre principale
        const fill = document.getElementById('barDays');

        fill.style.width = progress + '%';
        fill.style.background = getGradient(progress);
      }

      update();

      setInterval(update, 1000);
    </script>
  </body>
</html>
